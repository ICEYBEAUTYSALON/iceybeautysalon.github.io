<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ICEY BEAUTY STUDIO | Windsor Nails, Braids, Lashes & Beauty</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet"/>
  <script src="https://assets.calendly.com/assets/external/widget.js" defer></script>

  <!-- ✅ YOUR ORIGINAL STYLE KEPT EXACT -->
  <style>
  /* (UNCHANGED — your entire style remains EXACT) */
  </style>
</head>

<body>

<!-- ✅ EVERYTHING ABOVE UNCHANGED (NAV / HERO / SERVICES / ETC) -->

<!-- KEEP YOUR ENTIRE HTML EXACTLY SAME UNTIL SCRIPT -->

<script>
const calendlyUrl = "https://calendly.com/omoseleesther1113/30min";

const modal = document.getElementById("serviceModal");
const serviceTitle = document.getElementById("serviceTitle");
const serviceDesc = document.getElementById("serviceDesc");
const closeModalBtn = document.getElementById("closeModalBtn");
const serviceCards = document.querySelectorAll(".service-card");
const modalBookBtn = document.getElementById("modalBookBtn");

let currentService = null;
let selectedOption = null;
let selectedAddons = [];
let totalPrice = 0;

// ✅ FULL DATA (SERVICE + PRICE + ADDONS)
const servicesData = {
  "Acrylic": {
    options: [
      { name: "Short Full Set", price: 40 },
      { name: "Medium Full Set", price: 55 },
      { name: "Long Full Set", price: 70 },
      { name: "Fill-In", price: 50 }
    ]
  },
  "Gel": {
    options: [
      { name: "Gel Manicure", price: 30 },
      { name: "Clear Manicure", price: 25 },
      { name: "Short Gel-X Set", price: 40 },
      { name: "Medium Gel-X Set", price: 55 },
      { name: "Long Gel-X Set", price: 60 }
    ]
  },
  "Weaving": {
    options: [
      { name: "Basic Sew-In", price: 90 },
      { name: "Closure Sew-In", price: 120 },
      { name: "Braids + Quick Weave", price: 175 }
    ]
  }
};

// ✅ ADDONS (GLOBAL)
const addonsList = [
  { name: "3D Designs", price: 20 },
  { name: "3D Lines", price: 5 },
  { name: "Gel X Toes", price: 40 },
  { name: "Chrome", price: 5 },
  { name: "French Tips Design", price: 20 },
  { name: "Soak Off", price: 15 }
];

// Calendly
function openCalendly(e) {
  if (e) e.preventDefault();
  if (window.Calendly) {
    Calendly.initPopupWidget({ url: calendlyUrl });
  }
}

function clearSelectedCards() {
  serviceCards.forEach((card) => card.classList.remove("selected"));
}

// STEP 1
function openService(card, title, desc) {
  clearSelectedCards();
  card.classList.add("selected");

  currentService = title;
  selectedOption = null;
  selectedAddons = [];
  totalPrice = 0;

  serviceTitle.textContent = title;
  serviceDesc.textContent = desc;

  modalBookBtn.style.display = "none";

  renderContinueBtn();

  modal.classList.add("active");
}

// STEP 2
function renderContinueBtn() {
  let btn = document.getElementById("continueBtn");

  if (!btn) {
    btn = document.createElement("button");
    btn.id = "continueBtn";
    btn.className = "btn btn-primary";
    btn.innerHTML = "Continue";
    modalBookBtn.parentNode.insertBefore(btn, modalBookBtn);
  }

  btn.onclick = showOptions;
  btn.style.display = "inline-flex";
}

// STEP 3 OPTIONS
function showOptions() {
  const data = servicesData[currentService];
  serviceDesc.innerHTML = "";

  data.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "btn btn-outline";
    btn.style.marginTop = "10px";
    btn.textContent = `${opt.name} - $${opt.price}`;

    btn.onclick = () => {
      selectedOption = opt;
      totalPrice = opt.price;
      showAddons();
    };

    serviceDesc.appendChild(btn);
  });

  document.getElementById("continueBtn").style.display = "none";
}

// STEP 4 ADDONS
function showAddons() {
  serviceDesc.innerHTML = "<strong>Select Add-ons:</strong><br>";

  addonsList.forEach(add => {
    const btn = document.createElement("button");
    btn.className = "btn btn-outline";
    btn.style.marginTop = "10px";
    btn.textContent = `${add.name} +$${add.price}`;

    btn.onclick = () => toggleAddon(add, btn);

    serviceDesc.appendChild(btn);
  });

  const next = document.createElement("button");
  next.className = "btn btn-primary";
  next.style.marginTop = "15px";
  next.textContent = "Continue";

  next.onclick = showSummary;

  serviceDesc.appendChild(next);
}

// ADDON SELECT
function toggleAddon(add, btn) {
  const exists = selectedAddons.find(a => a.name === add.name);

  if (exists) {
    selectedAddons = selectedAddons.filter(a => a.name !== add.name);
    totalPrice -= add.price;
    btn.classList.remove("selected");
  } else {
    selectedAddons.push(add);
    totalPrice += add.price;
    btn.classList.add("selected");
  }
}

// STEP 5 SUMMARY
function showSummary() {
  let html = `<strong>${selectedOption.name}</strong><br>`;
  html += `Base: $${selectedOption.price}<br><br>`;

  if (selectedAddons.length) {
    html += "<strong>Add-ons:</strong><br>";
    selectedAddons.forEach(a => {
      html += `+ ${a.name} ($${a.price})<br>`;
    });
  }

  html += `<br><strong>Total: $${totalPrice}</strong>`;

  serviceDesc.innerHTML = html;

  modalBookBtn.style.display = "inline-flex";
}

// CLOSE
function closeService() {
  modal.classList.remove("active");
  clearSelectedCards();
}

// EVENTS
document.getElementById("bookNowBtn").addEventListener("click", openCalendly);
document.getElementById("modalBookBtn").addEventListener("click", openCalendly);
document.getElementById("floatBookBtn").addEventListener("click", openCalendly);
closeModalBtn.addEventListener("click", closeService);

serviceCards.forEach((card) => {
  card.addEventListener("click", () => {
    openService(card, card.dataset.title, card.dataset.desc);
  });
});

modal.addEventListener("click", (e) => {
  if (e.target === modal) closeService();
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeService();
});

// FOOTER
document.getElementById("footerYear").textContent =
  `© ${new Date().getFullYear()} ICEY BEAUTY STUDIO`;
</script>

</body>
</html>
