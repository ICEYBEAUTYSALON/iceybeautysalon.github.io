<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ICEY BEAUTY STUDIO | Windsor Nails Braids Lashes</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
<script src="https://assets.calendly.com/assets/external/widget.js" defer></script>

<style>

body{
margin:0;
font-family:Poppins,sans-serif;
background:#050507;
color:white;
}

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:url("https://images.unsplash.com/photo-1600948836101-f9ffda59d250") center/cover;
}

.hero h1{
font-family:"Playfair Display";
font-size:60px;
}

.btn{
padding:15px 35px;
border:none;
border-radius:30px;
background:#7ef7ff;
font-weight:bold;
cursor:pointer;
}

.section{
padding:80px 20px;
max-width:1100px;
margin:auto;
}

.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.service-card{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:12px;
cursor:pointer;
}

.service-card:hover{
border:1px solid #7ef7ff;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
align-items:center;
justify-content:center;
}

.modal.active{
display:flex;
}

.modal-box{
background:#0c0c12;
padding:30px;
border-radius:18px;
width:420px;
text-align:center;
}

.subservices{
margin:20px 0;
display:grid;
gap:10px;
}

.sub-btn{
padding:12px;
border-radius:10px;
background:#14141a;
border:1px solid #333;
cursor:pointer;
color:white;
}

.sub-btn.selected{
border:1px solid #7ef7ff;
}

.deposit{
font-size:14px;
opacity:0.8;
margin-top:15px;
}

</style>
</head>

<body>

<header class="hero">

<div>

<h1>ICEY BEAUTY STUDIO</h1>

<p>Luxury Nails • Braids • Lashes • Beauty</p>

<button class="btn" id="bookNowBtn">
Book Appointment
</button>

</div>

</header>

<section class="section">

<h2>Our Services</h2>

<div class="services">

<div class="service-card" data-title="Acrylic Nails">
<h3>Acrylic Nails</h3>
</div>

<div class="service-card" data-title="Gel Nails">
<h3>Gel Nails</h3>
</div>

<div class="service-card" data-title="Pedicure">
<h3>Pedicure</h3>
</div>

<div class="service-card" data-title="Lash Extensions">
<h3>Lash Extensions</h3>
</div>

<div class="service-card" data-title="Braiding">
<h3>Braiding</h3>
</div>

<div class="service-card" data-title="Weaving">
<h3>Weaving</h3>
</div>

</div>

</section>

<div class="modal" id="serviceModal">

<div class="modal-box">

<h2 id="serviceTitle"></h2>

<div id="subServices" class="subservices"></div>

<button class="btn" id="modalBookBtn">
Book Appointment
</button>

<p class="deposit">

A $20 deposit is required to secure your appointment.  
Send e-transfer to **omoseleesther113@gmail.com**

</p>

</div>

</div>

<script>

let selectedService=null
let selectedCalendar=null

const modal=document.getElementById("serviceModal")
const serviceTitle=document.getElementById("serviceTitle")
const subServicesBox=document.getElementById("subServices")

/* CALENDLY LINKS */

const calendars={

braids:"https://calendly.com/omoseleesther1113/braids",
lashes:"https://calendly.com/omoseleesther1113/lashes",
nails:"https://calendly.com/omoseleesther1113/nails",
pedicure:"https://calendly.com/omoseleesther1113/pedicure",
weave:"https://calendly.com/omoseleesther1113/weave"

}

const services={

"Acrylic Nails":{
calendar:calendars.nails,
options:[
"Short Acrylic Set",
"Medium Acrylic Set",
"Long Acrylic Set",
"XL Acrylic Set"
]
},

"Gel Nails":{
calendar:calendars.nails,
options:[
"Gel Manicure",
"Gel Overlay",
"Gel Refill"
]
},

"Pedicure":{
calendar:calendars.pedicure,
options:[
"Classic Pedicure",
"Deluxe Pedicure",
"Luxury Pedicure"
]
},

"Lash Extensions":{
calendar:calendars.lashes,
options:[
"Classic Lashes",
"Hybrid Lashes",
"Volume Lashes",
"Mega Volume"
]
},

"Braiding":{
calendar:calendars.braids,
options:[
"Knotless Braids",
"Box Braids",
"Cornrows",
"Fulani Braids"
]
},

"Weaving":{
calendar:calendars.weave,
options:[
"Sew-In Install",
"Closure Sew-In",
"Frontal Install",
"Quick Weave"
]
}

}

function openService(title){

serviceTitle.textContent=title
subServicesBox.innerHTML=""
selectedService=null

services[title].options.forEach(service=>{

const btn=document.createElement("button")

btn.className="sub-btn"

btn.textContent=service

btn.onclick=()=>{

document.querySelectorAll(".sub-btn")
.forEach(b=>b.classList.remove("selected"))

btn.classList.add("selected")

selectedService=service
selectedCalendar=services[title].calendar

}

subServicesBox.appendChild(btn)

})

modal.classList.add("active")

}

function bookService(){

if(!selectedService){

alert("Please choose a service first")

return

}

Calendly.initPopupWidget({
url:selectedCalendar
})

}

document.querySelectorAll(".service-card")
.forEach(card=>{

card.onclick=()=>{

openService(card.dataset.title)

}

})

document.getElementById("modalBookBtn")
.addEventListener("click",bookService)

document.getElementById("bookNowBtn")
.addEventListener("click",()=>{

Calendly.initPopupWidget({
url:"https://calendly.com/omoseleesther1113/30min"
})

})

</script>

</body>
</html>
